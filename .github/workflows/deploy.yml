name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd HudaFikr-Flask-Project/HudaFikr
            git fetch origin
            git reset --hard origin/main
            pkill -f app.py || true
            nohup python3 app.py > app.log 2>&1 < /dev/null &
            exit 0